<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashBoard</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="
    https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js
    "></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/drawflow@0.0.60/dist/drawflow.min.css"
    />
  </head>
  <body>
    <h1 class="head">SMARTS FARM</h1>
    <div class="blockbtn">
      <div class="btn3">
        <button class="btnFunc" id="log">
          <i class="fa-solid fa-comment-dots"></i>
        </button>
      </div>
      </div>
    </div>
    <div class="container">
      <div class="box box1">
        <h1 class="heading">Tham số môi trường</h1>
        <h2>Nhiệt độ hiện tại: <span id="nhietdo">-- °C</span></h2>
        <h2>Độ ẩm hiện tại: <span id="doam">-- %</span></h2>
        <h2>Đèn chiếu sáng <span id="warnLed">Đang tắt</span></h2>
        <h2>Máy bơm <span id="warnMaybom">Đang tắt</span></h2>
      </div>
      <div class="box box2" style="display: none;">
        <h1 class="heading">Log hệ thống</h1>
        <button class="golive" id="live2">
          <img src="img/stream.png" alt="lỗi tải ảnh" />
        </button>
        <h2>Ngày: <span id="ngayLog">--</span></h2>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://unpkg.com/drawflow@0.0.60/dist/drawflow.min.js"></script>
    <script type="module" src="js/smartfarm.js"></script>
  </body>
</html>
